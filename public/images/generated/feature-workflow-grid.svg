    <rect x="46" y="44" width="400" height="310" rx="20" fill="url(#tile)" stroke="#d4dfe1"/>
    <rect x="472" y="44" width="400" height="310" rx="20" fill="url(#tile)" stroke="#d4dfe1"/>
